<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Meta Leads Hub{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f17;
      --bg-card: #161a27;
      --bg-card2: #1e2336;
      --border: #2a2f45;
      --accent: #4f7fff;
      --accent-glow: rgba(79,127,255,0.18);
      --accent2: #9b59f5;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --gray: #6b7280;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 240px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 24px 16px;
      z-index: 100;
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 0 8px 28px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .sidebar-logo-text { font-weight: 700; font-size: 15px; line-height: 1.2; }
    .sidebar-logo-text span { color: var(--text-muted); font-weight: 400; font-size: 11px; display: block; }
    .nav { margin-top: 24px; flex: 1; }
    .nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      color: var(--text-muted); text-decoration: none;
      font-size: 14px; font-weight: 500;
      transition: all 0.2s;
      margin-bottom: 4px;
    }
    .nav a:hover, .nav a.active {
      background: var(--accent-glow); color: var(--accent);
    }
    .nav a .icon { font-size: 18px; width: 22px; text-align: center; }
    .sidebar-footer {
      padding-top: 16px; border-top: 1px solid var(--border);
      font-size: 12px; color: var(--text-muted); text-align: center;
    }

    /* MAIN */
    .main {
      margin-left: 240px;
      padding: 32px;
      min-height: 100vh;
    }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 22px; font-weight: 700; }
    .page-header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

    /* CARDS */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    /* STATS GRID */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-card.total::before { background: var(--accent); }
    .stat-card.forwarded::before { background: var(--green); }
    .stat-card.failed::before { background: var(--red); }
    .stat-card.skipped::before { background: var(--yellow); }
    .stat-card.received::before { background: var(--accent2); }
    .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-card.total .stat-value { color: var(--accent); }
    .stat-card.forwarded .stat-value { color: var(--green); }
    .stat-card.failed .stat-value { color: var(--red); }
    .stat-card.skipped .stat-value { color: var(--yellow); }
    .stat-card.received .stat-value { color: var(--accent2); }

    /* FILTERS */
    .filters {
      display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .filters input, .filters select {
      background: var(--bg-card2); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius-sm);
      padding: 8px 14px; font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .filters input:focus, .filters select:focus { border-color: var(--accent); }
    .filters input { flex: 1; min-width: 200px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: var(--radius-sm);
      border: none; cursor: pointer; font-size: 14px; font-weight: 500;
      font-family: inherit; transition: all 0.2s; text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #3b6fe0; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,127,255,0.35); }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-warning { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
    .btn-warning:hover { background: rgba(245,158,11,0.25); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* TABLE */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th {
      text-align: left; padding: 10px 14px;
      color: var(--text-muted); font-weight: 500; font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-card2); }
    tbody td { padding: 12px 14px; vertical-align: middle; }

    /* BADGES */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
    }
    .badge-forwarded { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-failed { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-received { background: rgba(155,89,245,0.15); color: var(--accent2); }
    .badge-skipped { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .badge-active { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-inactive { background: rgba(107,114,128,0.15); color: var(--gray); }

    /* FIELD PILLS */
    .field-pill { display: inline-block; background: var(--bg-card2); border: 1px solid var(--border);
      border-radius: 6px; padding: 2px 8px; margin: 2px; font-size: 11px; }
    .field-pill strong { color: var(--text-muted); }

    /* PAGINATION */
    .pagination { display: flex; align-items: center; gap: 8px; margin-top: 20px; justify-content: center; }
    .pagination a {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); color: var(--text-muted);
      text-decoration: none; font-size: 14px; transition: all 0.2s;
    }
    .pagination a:hover, .pagination a.active {
      border-color: var(--accent); color: var(--accent); background: var(--accent-glow);
    }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px; width: 100%; max-width: 480px;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal h2 { font-size: 18px; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; background: var(--bg-card2); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius-sm);
      padding: 9px 12px; font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .text-muted { color: var(--text-muted); font-size: 12px; }
    .mono { font-family: 'Courier New', monospace; font-size: 12px; word-break: break-all; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">📡</div>
      <div class="sidebar-logo-text">
        Meta Leads Hub
        <span>Central de Leads</span>
      </div>
    </div>
    <nav class="nav">
      <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
        <span class="icon">📊</span> Dashboard
      </a>
      <a href="/mappings" class="{% if request.url.path == '/mappings' %}active{% endif %}">
        <span class="icon">🔗</span> Mapeamentos
      </a>
      <a href="/docs" target="_blank">
        <span class="icon">📚</span> API Docs
      </a>
    </nav>
    <div class="sidebar-footer">v1.0.0 &mdash; HeadOffice</div>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
