
services:
  # ──────────────────────────────────────────────
  # Web — FastAPI Central de Leads
  # ──────────────────────────────────────────────
  web:
    build: .
    container_name: meta-leads-hub-instance
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    # As variáveis de ambiente (como MONGO_URL) serão carregadas a partir do arquivo .env
    # Se você precisar sobrescrever alguma variável especificamente no docker-compose, faça-o abaixo.
    # environment:
    #   - PUBLIC_URL=https://leads.meudominio.com.br

